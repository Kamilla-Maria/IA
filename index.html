<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Hello Kitty</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fff0f7 0%, #ffe4f0 50%, #ffd9eb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: linear-gradient(to bottom, #ffebf0 0%, #fff5f9 100%);
            border-radius: 30px;
            box-shadow: 0 15px 50px rgba(255, 105, 180, 0.2), 0 0 0 1px rgba(255, 182, 193, 0.3);
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 700px;
            overflow: hidden;
            border: 3px solid #ffb6d9;
        }

        .header {
            background: linear-gradient(135deg, #ff69b4 0%, #ff85c1 100%);
            padding: 25px;
            text-align: center;
            border-bottom: 3px solid #ff1493;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.3);
        }

        .header-title {
            color: white;
            font-size: 32px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            letter-spacing: 1px;
        }

        .header-subtitle {
            color: rgba(255, 255, 255, 0.95);
            font-size: 14px;
            margin-top: 5px;
            font-weight: 300;
        }

        .bow-decoration {
            display: inline-block;
            font-size: 20px;
            margin: 0 8px;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            gap: 15px;
            display: flex;
            flex-direction: column;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.6), rgba(255, 240, 247, 0.8));
        }

        .chat-container::-webkit-scrollbar {
            width: 8px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: #ffb6d9;
            border-radius: 4px;
        }

        .chat-container::-webkit-scrollbar-thumb:hover {
            background: #ff85c1;
        }

        .message {
            display: flex;
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 20px;
            word-wrap: break-word;
            line-height: 1.4;
            font-size: 14px;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #ff69b4 0%, #ff85c1 100%);
            color: white;
            border-bottom-right-radius: 5px;
            box-shadow: 0 4px 12px rgba(255, 105, 180, 0.3);
        }

        .message.bot .message-content {
            background: linear-gradient(135deg, #fff0f7 0%, #fff5f9 100%);
            color: #d1486a;
            border: 2px solid #ffc0e0;
            border-bottom-left-radius: 5px;
            box-shadow: 0 4px 12px rgba(255, 182, 193, 0.2);
        }

        .input-section {
            padding: 20px;
            background: linear-gradient(to top, rgba(255, 182, 193, 0.2), transparent);
            border-top: 2px solid #ffb6d9;
            display: flex;
            gap: 10px;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            background: white;
            border-radius: 25px;
            border: 2px solid #ffc0e0;
            padding: 10px 20px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(255, 182, 193, 0.2);
        }

        .input-wrapper:focus-within {
            border-color: #ff69b4;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.3);
        }

        #messageInput {
            flex: 1;
            border: none;
            outline: none;
            font-size: 14px;
            color: #333;
            font-family: inherit;
        }

        #messageInput::placeholder {
            color: #ffb6d9;
        }

        .send-btn {
            background: linear-gradient(135deg, #ff69b4 0%, #ff1493 100%);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(255, 105, 180, 0.3);
            font-weight: bold;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 18px rgba(255, 20, 147, 0.4);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #ff85c1;
        }

        .empty-state-icon {
            font-size: 60px;
            margin-bottom: 15px;
            opacity: 0.8;
        }

        .empty-state-text {
            font-size: 16px;
            text-align: center;
            line-height: 1.6;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ff69b4;
            font-size: 14px;
        }

        .loading-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff69b4;
            animation: bounce 1.4s infinite;
        }

        .loading-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                opacity: 0.3;
                transform: scale(0.8);
            }
            40% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .timestamp {
            font-size: 12px;
            color: #ffb6d9;
            margin-top: 5px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="bow-decoration">🎀</div>
            <div class="header-title">IA Hello Kitty</div>
            <div class="header-subtitle">Sua assistente de IA delicada e fofa 💕</div>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="empty-state">
                <div class="empty-state-icon">🎀</div>
                <div class="empty-state-text">
                    Olá! Sou sua assistente Hello Kitty! 💕<br>
                    Comece digitando uma mensagem...
                </div>
            </div>
        </div>

        <div class="input-section">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    id="messageInput" 
                    placeholder="Digite sua mensagem aqui..."
                    autocomplete="off"
                >
            </div>
            <button class="send-btn" id="sendBtn">↑</button>
        </div>
    </div>

    <script>
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatContainer = document.getElementById('chatContainer');
        let isFirstMessage = true;

        function addMessage(content, isUser = false) {
            if (isFirstMessage) {
                chatContainer.innerHTML = '';
                isFirstMessage = false;
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;

            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showLoading() {
            if (isFirstMessage) {
                chatContainer.innerHTML = '';
                isFirstMessage = false;
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = 'message bot';
            messageDiv.id = 'loadingMessage';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = `
                <div class="loading">
                    <span>Digitando</span>
                    <div class="loading-dot"></div>
                    <div class="loading-dot"></div>
                    <div class="loading-dot"></div>
                </div>
            `;

            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeLoading() {
            const loadingMessage = document.getElementById('loadingMessage');
            if (loadingMessage) {
                loadingMessage.remove();
            }
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            addMessage(message, true);
            messageInput.value = '';
            messageInput.focus();

            showLoading();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message })
                });

                removeLoading();

                if (response.ok) {
                    const data = await response.json();
                    addMessage(data.reply, false);
                } else {
                    addMessage('Ops! Algo deu errado. Tente novamente! 💕', false);
                }
            } catch (error) {
                removeLoading();
                addMessage('Desculpe, não consegui conectar ao servidor. 💕', false);
                console.error('Erro:', error);
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        messageInput.focus();
    </script>
</body>
</html>
